      operationId: getCashForecast
      tags: [cash-forecast]
      parameters:
        - name: companyId
          in: query
          schema:
            type: integer
        - name: weeks
          in: query
          schema:
            type: integer
            default: 8
        - name: interval
          in: query
          schema:
            type: string
            enum: [week, month]
            default: week
          description: Agrupación del pronóstico (semanal o mensual)
      responses:
        "200":
          description: Cash forecast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashForecast"

