openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Facturación, Tesorería y Previsión de Caja API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: companies
    description: Company management
  - name: clients
    description: Client management
  - name: suppliers
    description: Supplier management
  - name: projects
    description: Project management
  - name: categories
    description: Category management
  - name: invoices
    description: Invoice management
  - name: vendor-invoices
    description: Vendor invoice management
  - name: expenses
    description: Expense management
  - name: bank-accounts
    description: Bank account management
  - name: cash-movements
    description: Cash movement management
  - name: treasury
    description: Treasury dashboard
  - name: cash-forecast
    description: Cash forecast
  - name: dashboard
    description: Dashboard KPIs
  - name: tasks
    description: Task management
  - name: voice
    description: Voice command processing
  - name: auth
    description: Autenticación y Registro de usuarios
  - name: invitations
    description: Gestión de invitaciones al sistema

paths:
  /authorized-users:
    get:
      summary: Obtener la lista de usuarios autorizados
      tags:
        - Authorized Users
      responses:
        '200':
          description: Lista de usuarios y sus accesos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuthorizedUser'
    post:
      summary: Crear o invitar un usuario autorizado
      tags:
        - Authorized Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAuthorizedUserBody'
      responses:
        '201':
          description: Usuario autorizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizedUser'

  /authorized-users/{userId}:
    put:
      summary: Actualizar permisos de un usuario
      tags:
        - Authorized Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAuthorizedUserBody'
      responses:
        '200':
          description: Permisos actualizados con éxito
    delete:
      summary: Revocar acceso de un usuario
      tags:
        - Authorized Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Acceso revocado completamente

  /auth/register:
    post:
      summary: Registrar un nuevo usuario usando un token de invitación
      operationId: registerUser
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        '200':
          description: Registro completado con éxito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /invitations:
    post:
      summary: Crear una nueva invitación (Solo Administradores)
      operationId: createInvitation
      tags:
        - invitations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationInput'
      responses:
        '201':
          description: Invitación creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
    get:
      summary: Listar todas las invitaciones
      operationId: listInvitations
      tags:
        - invitations
      parameters:
        - name: companyId
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Lista de invitaciones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invitation'
                  
  /dashboard/debt-analysis:
    get:
      summary: Obtener análisis de deuda y cartera (Aging)
      operationId: getDebtAnalysis
      tags:
        - Dashboard
      parameters:
        - in: query
          name: companyId
          schema:
            type: integer
          required: false
          description: Filtrar por ID de la empresa
      responses:
        '200':
          description: Análisis detallado de cobros y pagos pendientes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtAnalysisData'
      
  /recurring-commitments:
    get:
      operationId: listRecurringCommitments
      tags: [recurring-commitments]
      parameters:
        - name: companyId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of recurring commitments
          content:
