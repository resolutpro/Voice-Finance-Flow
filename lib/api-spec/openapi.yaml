  /voice/parse:
    post:
      operationId: parseVoiceCommand
      tags: [voice]
      summary: Parse natural language voice command into structured action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
                companyId:
                  type: integer
              required:
