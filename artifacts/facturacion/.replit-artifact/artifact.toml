kind = "web"
previewPath = "/"
title = "Facturación & Tesorería"
version = "1.0.0"
id = "artifacts/facturacion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 26202
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/facturacion run dev"

[services.env]
PORT = "26202"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/facturacion", "run", "build"]
publicDir = "artifacts/facturacion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
