packages:
  "recharts": "For the cash forecast and dashboard charts"
  "date-fns": "For formatting dates in Spanish"
  "lucide-react": "For UI icons"
  "clsx": "For utility class merging"
  "tailwind-merge": "For utility class merging"
  "framer-motion": "For fluid UI animations and the voice assistant pulse"

images:
  - path: "artifacts/facturacion/public/images/auth-bg.png"
    description: "Abstract minimal geometric background in light slate and deep blue with soft lighting, suitable for a financial app"
    aspect_ratio: "16:9"
  - path: "artifacts/facturacion/public/images/logo.png"
    description: "Clean, minimal, premium logo mark for a treasury and financial software, deep blue, transparent background"
    aspect_ratio: "1:1"

notes:
  - Using generated hooks from @workspace/api-client-react
  - Assuming window.SpeechRecognition or window.webkitSpeechRecognition is available in the browser for voice commands
